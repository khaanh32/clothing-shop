# 1. URL kết nối tới MySQL localhost
spring.datasource.url=jdbc:mysql://localhost:3306/nhasach?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Cấu hình Hibernate (Sử dụng MySQL Dialect)
# Quan trọng: 'none' vì bạn đã có file nhasach.sql và dữ liệu mẫu
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# 3. Cấu hình HikariCP (Tối ưu cho Localhost)
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-test-query=SELECT 1

# 4. Debug lỗi
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always